<div class="card">
    <div class="card-title"> Состав газа</div>
    
    <div id="composition-table">
        <table class="table" id="comp-table">
            <thead>
                <tr>
                    <th>Компонент</th>
                    <th>Мольная доля</th>
                    <th>Массовая доля</th>
                    <th>M_i (кг/кмоль)</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="comp-tbody">
                <!-- Строки добавляются через JS -->
            </tbody>
        </table>
    </div>
    
    <div style="margin-top: 12px;">
        <button type="button" id="add-component-btn">+ Добавить компонент</button>
        <button type="button" id="save-composition-btn" style="margin-left: 12px;" disabled> Сохранить</button>
    </div>
    
    <div id="sum-check" style="margin-top: 16px; font-weight: bold;">
        Контроль суммы: <span id="sum-value">0.00</span>%
        <span id="sum-warning" style="color: red; display: none;"> (сумма не равна 100%)</span>
    </div>
</div>

<div class="card">
    <div class="card-title"> Результаты</div>
    <div id="comp-results">
        <div class="result-item"><strong>Молекулярная масса смеси Mсм:</strong> <span id="Msm">—</span> кг/кмоль</div>
        <div class="result-item"><strong>Относительная плотность ρ̅:</strong> <span id="rho_bar">—</span></div>
        <div class="result-item"><strong>Плотность при ст.условиях ρст:</strong> <span id="rho_std">—</span> кг/м³</div>
    </div>
</div>

<script>
// Список доступных компонентов из сервера
const componentsList = {{ components | tojson }};
const componentsData = {};

// Загружаем справочные данные компонентов
async function loadComponentsData() {
    const response = await fetch('/get_components_data');
    const data = await response.json();
    Object.assign(componentsData, data);
}

// Добавить строку в таблицу
function addCompositionRow(component = '', moleFraction = '') {
    const tbody = document.getElementById('comp-tbody');
    const row = tbody.insertRow();
    
    // Компонент (выпадающий список)
    const cellComp = row.insertCell(0);
    const select = document.createElement('select');
    select.className = 'comp-select';
    select.innerHTML = '<option value="">— Выберите —</option>';
    for (const comp of componentsList) {
        select.innerHTML += `<option value="${comp}" ${comp === component ? 'selected' : ''}>${comp}</option>`;
    }
    cellComp.appendChild(select);
    
    // Мольная доля
    const cellMole = row.insertCell(1);
    const moleInput = document.createElement('input');
    moleInput.type = 'number';
    moleInput.step = '0.0001';
    moleInput.value = moleFraction;
    moleInput.className = 'mole-input';
    cellMole.appendChild(moleInput);
    
    // Массовая доля (только для отображения)
    const cellMass = row.insertCell(2);
    const massSpan = document.createElement('span');
    massSpan.className = 'mass-value';
    massSpan.textContent = '—';
    cellMass.appendChild(massSpan);
    
    // M_i
    const cellMi = row.insertCell(3);
    cellMi.textContent = component ? (componentsData[component]?.M || '—') : '—';
    cellMi.className = 'mi-value';
    
    // Кнопка удаления
    const cellDel = row.insertCell(4);
    const delBtn = document.createElement('button');
    delBtn.textContent = '🗑️';
    delBtn.style.background = '#dc3545';
    delBtn.style.padding = '4px 8px';
    delBtn.onclick = () => {
        row.remove();
        updateSumAndButton();
    };
    cellDel.appendChild(delBtn);
    
    // Обновляем M_i при смене компонента
    select.onchange = () => {
        const comp = select.value;
        cellMi.textContent = comp ? (componentsData[comp]?.M || '—') : '—';
        updateSumAndButton();
    };
    
    moleInput.oninput = () => updateSumAndButton();
}

// Получить сумму мольных долей
function getMoleSum() {
    let sum = 0;
    const rows = document.querySelectorAll('#comp-tbody tr');
    for (const row of rows) {
        const moleInput = row.querySelector('.mole-input');
        if (moleInput && moleInput.value) {
            sum += parseFloat(moleInput.value) || 0;
        }
    }
    return sum;
}

// Получить состав из таблицы
function getCompositionFromTable() {
    const comp = {};
    const rows = document.querySelectorAll('#comp-tbody tr');
    for (const row of rows) {
        const select = row.querySelector('.comp-select');
        const moleInput = row.querySelector('.mole-input');
        const component = select?.value;
        if (component && moleInput?.value) {
            comp[component] = parseFloat(moleInput.value) || 0;
        }
    }
    return comp;
}

// Рассчитать массовые доли и обновить таблицу
function updateMassFractions(composition, Msm) {
    const rows = document.querySelectorAll('#comp-tbody tr');
    for (const row of rows) {
        const select = row.querySelector('.comp-select');
        const component = select?.value;
        const moleInput = row.querySelector('.mole-input');
        const massSpan = row.querySelector('.mass-value');
        
        if (component && moleInput && massSpan && Msm > 0) {
            const y = parseFloat(moleInput.value) || 0;
            const M = componentsData[component]?.M || 0;
            const g = (y * M) / Msm;
            massSpan.textContent = g.toFixed(6);
        }
    }
}

// Обновить контроль суммы и состояние кнопки
function updateSumAndButton() {
    const sum = getMoleSum();
    const sumPercent = (sum * 100).toFixed(2);
    document.getElementById('sum-value').textContent = sumPercent;
    
    const isSumValid = Math.abs(sum - 1) <= 0.001;
    const saveBtn = document.getElementById('save-composition-btn');
    const warningSpan = document.getElementById('sum-warning');
    
    saveBtn.disabled = !isSumValid;
    warningSpan.style.display = isSumValid ? 'none' : 'inline';
    
    return isSumValid;
}

// Сохранить состав и отправить на сервер
function saveComposition() {
    if (!updateSumAndButton()) return;
    
    const composition = getCompositionFromTable();
    
    fetch('/calculate_composition', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({composition: composition})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('Msm').textContent = data.Msm;
        document.getElementById('rho_bar').textContent = data.rho_bar;
        document.getElementById('rho_std').textContent = data.rho_std;
        
        // Обновляем массовые доли в таблице
        updateMassFractions(composition, data.Msm);
        
        // Сохраняем в sessionStorage для других вкладок
        sessionStorage.setItem('composition', JSON.stringify(composition));
        sessionStorage.setItem('Msm', data.Msm);
        sessionStorage.setItem('rho_bar', data.rho_bar);
        sessionStorage.setItem('rho_std', data.rho_std);
        sessionStorage.setItem('P_kr', data.P_kr);
        sessionStorage.setItem('T_kr', data.T_kr);
        sessionStorage.setItem('omega_cm', data.omega_cm);
	sessionStorage.setItem('P_kr', data.P_kr);
	sessionStorage.setItem('T_kr', data.T_kr);
	sessionStorage.setItem('omega_cm', data.omega_cm);
    });
}

// Инициализация
document.addEventListener('DOMContentLoaded', async () => {
    await loadComponentsData();
    
    // Добавляем 5 стандартных строк
    const defaultComponents = ['CH4', 'C2H6', 'C3H8', 'N2', 'CO2'];
    const defaultFractions = [0.92, 0.04, 0.02, 0.01, 0.01];
    for (let i = 0; i < defaultComponents.length; i++) {
        addCompositionRow(defaultComponents[i], defaultFractions[i]);
    }
    
    document.getElementById('add-component-btn').onclick = () => addCompositionRow('', '');
    document.getElementById('save-composition-btn').onclick = saveComposition;
    
    updateSumAndButton();
});
</script>
