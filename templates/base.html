<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор свойств газа</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Калькулятор свойств газа</h1>
            <div class="authors">Филиппова Л. | Бондарь В. | Сынкова Д.</div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="tab1">Состав</button>
            <button class="tab-btn" data-tab="tab2">Критические параметры</button>
            <button class="tab-btn" data-tab="tab3">Коэффициент сверхсжимаемости</button>
            <button class="tab-btn" data-tab="tab4">Физические свойства</button>
            <button class="tab-btn" data-tab="tab5">Коэффициент Джоуля-Томсона</button>
        </div>

        <div class="tab-contents">
            <div id="tab1" class="tab-content active">
                {% include 'tab1_composition.html' %}
            </div>
            <div id="tab2" class="tab-content">
                {% include 'tab2_critical.html' %}
            </div>
            <div id="tab3" class="tab-content">
                {% include 'tab3_z.html' %}
            </div>
            <div id="tab4" class="tab-content">
                {% include 'tab4_properties.html' %}
            </div>
            <div id="tab5" class="tab-content">
                {% include 'tab5_joule.html' %}
            </div>
        </div>
    </div>

    <script>
        // Переключение вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            });
        });
    </script>
</body>
</html>
